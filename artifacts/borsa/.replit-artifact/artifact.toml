kind = "web"
previewPath = "/"
title = "Borsa Analiz"
version = "1.0.0"
id = "artifacts/borsa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25429

[services.development]
run = "pnpm --filter @workspace/borsa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/borsa", "run", "build" ]
publicDir = "artifacts/borsa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25429"
BASE_PATH = "/"
