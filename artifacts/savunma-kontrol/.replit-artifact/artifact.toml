kind = "web"
previewPath = "/savunma-kontrol/"
title = "Savunma Sistemi Kontrol Paneli"
version = "1.0.0"
id = "artifacts/savunma-kontrol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/savunma-kontrol/" ]
localPort = 24702

[services.development]
run = "pnpm --filter @workspace/savunma-kontrol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/savunma-kontrol", "run", "build" ]
publicDir = "artifacts/savunma-kontrol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24702"
BASE_PATH = "/savunma-kontrol/"
